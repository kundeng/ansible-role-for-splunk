---
# Molecule destroy playbook for day0
# Dynamically cleans up containers based on inventory

- hosts: localhost
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/local/bin/python3
    targets: "{{ groups['full'] | default([]) + groups['uf'] | default([]) }}"
  tasks:
    - name: Stop and remove ansible-controller
      community.docker.docker_container:
        name: ansible-controller
        state: absent
        force_kill: true
      ignore_errors: true

    - name: Stop and remove Splunk containers
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
        force_kill: true
      loop: "{{ targets }}"
      loop_control:
        label: "{{ item }}"
      ignore_errors: true
