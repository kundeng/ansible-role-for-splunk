---
# Day 0 - Verification
# Checks that Splunk services are running after provisioning.
# Can be run directly from the ansible-controller:
#   ansible-playbook /workspace/testing/molecule/day0/verify.yml

- name: Verify Splunk services are running
  hosts: all:!git_server:!ansible_controller
  become: true
  tasks:
    - name: Check if Splunk service is running (full instances)
      ansible.builtin.systemd:
        name: Splunkd
      register: splunk_service_status
      when: "'full' in group_names"
      ignore_errors: true

    - name: Check if Splunk Universal Forwarder service is running
      ansible.builtin.systemd:
        name: SplunkForwarder
      register: splunkforwarder_service_status
      when: "'uf' in group_names"
      ignore_errors: true

    - name: Verify Splunk is listening on management port
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 8089
        timeout: 60
      when: "'full' in group_names"
      ignore_errors: true

    - name: Verify Splunk web interface is accessible (search heads)
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 8000
        timeout: 60
      when: "'shcluster' in group_names"
      ignore_errors: true

- name: Display cluster status (informational)
  hosts: clustermanager
  become: true
  become_user: splunk
  tasks:
    - name: Check cluster manager status
      ansible.builtin.command: /opt/splunk/bin/splunk show cluster-status -auth {{ splunk_auth }}
      register: cluster_status
      failed_when: false
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: cluster_status.stdout_lines
      when: cluster_status.stdout_lines is defined

- name: Display SHC status (informational)
  hosts: shdeployer
  become: true
  become_user: splunk
  tasks:
    - name: Check search head cluster status
      ansible.builtin.command: /opt/splunk/bin/splunk show shcluster-status -auth {{ splunk_auth }}
      register: shc_status
      failed_when: false
      changed_when: false

    - name: Display SHC status
      ansible.builtin.debug:
        var: shc_status.stdout_lines
      when: shc_status.stdout_lines is defined

- name: Verify Git server is accessible
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check Git server web interface
      ansible.builtin.uri:
        url: "http://git-server:8929"
        method: GET
        status_code: [200, 302]
      register: git_check
      ignore_errors: true

    - name: Verify Git server response
      ansible.builtin.debug:
        msg: "Git server is accessible and responding"
      when: git_check.status is defined and git_check.status in [200, 302]
