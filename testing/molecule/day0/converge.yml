---
# Day 0 - Splunk Provisioning
# Installs Splunk on target hosts.
# Can be run directly from the ansible-controller:
#   ansible-playbook /workspace/testing/molecule/day0/converge.yml
#
# The role's download_and_unarchive.yml handles software distribution:
#   splunk_download_local: true  → downloads once to localhost, pushes to targets via SCP
#   task download:splunk         → pre-caches tarballs so get_url skips the internet download

- name: Install Splunk on target hosts
  hosts: all:!ansible_controller:!git_server:!jumpbox
  serial: 50
  roles:
    - ../../../roles/splunk
  vars:
    deployment_task: check_splunk.yml
