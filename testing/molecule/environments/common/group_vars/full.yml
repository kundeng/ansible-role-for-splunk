---
# Splunk Enterprise specific variables (not applicable to UF)
# Environment-specific overrides go in their own group_vars/

# Splunk Enterprise paths
splunk_home: /opt/splunk
splunk_nix_home: /home/splunk

# Backup defaults (override splunk_backup: false per-environment to disable)
splunk_backup: true
splunk_backup_path: "{{ splunk_home }}/.."
splunk_backup_tar: "splunk-test-backup.tar"
