---
# Infrastructure Preparation - SSH Setup
# Sets up SSH connectivity between ansible-controller and all Splunk containers

# Read secrets from molecule-runner (localhost), where /workspace is bind-mounted.
# Target containers do not have /workspace, so secrets must be read here first.
- name: Read secrets from molecule-runner
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Slurp SSH keys and password
      ansible.builtin.slurp:
        src: "{{ item }}"
      loop:
        - /workspace/testing/.secrets/id_rsa
        - /workspace/testing/.secrets/id_rsa.pub
        - /workspace/testing/.secrets/ansible_password
      register: secrets_slurp

    - name: Expose secrets as facts
      ansible.builtin.set_fact:
        runner_private_key: "{{ (secrets_slurp.results | selectattr('item', 'equalto', '/workspace/testing/.secrets/id_rsa') | first).content | b64decode }}"
        runner_public_key: "{{ (secrets_slurp.results | selectattr('item', 'equalto', '/workspace/testing/.secrets/id_rsa.pub') | first).content | b64decode }}"
        ansible_plain_password: "{{ (secrets_slurp.results | selectattr('item', 'equalto', '/workspace/testing/.secrets/ansible_password') | first).content | b64decode | trim }}"

- name: Setup SSH Infrastructure
  hosts: all:!git_server
  gather_facts: true
  connection: docker
  become: true
  become_user: root
  vars:
    ansible_connection: docker  # Override inventory SSH setting for prepare phase
    ansible_user: root
    # Some base images can have restrictive/odd $HOME perms for root; force tmp into /tmp.
    ansible_remote_tmp: /tmp/.ansible/tmp
    runner_public_key: "{{ hostvars['localhost'].runner_public_key }}"
    runner_private_key: "{{ hostvars['localhost'].runner_private_key }}"
    ansible_plain_password: "{{ hostvars['localhost'].ansible_plain_password }}"
  tasks:
    - name: Wait for systemd to be ready
      ansible.builtin.wait_for:
        path: /run/systemd/system
      when: ansible_service_mgr == "systemd" and inventory_hostname != 'ansible-controller'
      tags: [ssh]

    - name: Disable veth checksum offloading (prevents large file transfer corruption)
      ansible.builtin.command: ethtool -K eth0 tx off rx off
      changed_when: false
      failed_when: false

    - name: Set up SSH infrastructure for all Splunk hosts
      tags: [ssh_keys]
      block:
        - name: Start SSH service
          ansible.builtin.systemd:
            name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"
            state: started
            enabled: true
          when: inventory_hostname != 'ansible-controller'

        - name: Create ansible user SSH directory
          ansible.builtin.file:
            path: /home/ansible/.ssh
            state: directory
            owner: ansible
            group: ansible
            mode: '0700'

    - name: Set up SSH infrastructure for all hosts
      block:
        - name: Copy SSH public key to authorized_keys
          ansible.builtin.copy:
            content: "{{ runner_public_key }}"
            dest: /home/ansible/.ssh/authorized_keys
            owner: ansible
            group: ansible
            mode: '0600'

        - name: Configure SSH client settings
          ansible.builtin.blockinfile:
            path: /home/ansible/.ssh/config
            create: true
            owner: ansible
            group: ansible
            mode: '0600'
            block: |
              Host *
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
                LogLevel ERROR

        - name: Create test data directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - /var/log/test-data
            - /tmp/test-logs
          when: (groups['uf'] is defined and inventory_hostname in groups['uf']) and ansible_distribution != 'Ubuntu' and ansible_distribution != 'AlmaLinux'

        - name: Ensure Splunk user and group exist
          block:
            - name: Create splunk group
              ansible.builtin.group:
                name: splunk
                state: present
                local: false
              when: splunk_nix_user | default('splunk') != 'root'

            - name: Check for splunk user
              ansible.builtin.command: id -u splunk
              register: splunk_user_id
              changed_when: false
              failed_when: false

            - name: Create splunk user
              ansible.builtin.user:
                name: splunk
                group: splunk
                home: /home/splunk
                state: present
                shell: /bin/bash
                local: false
                create_home: true
              when:
                - splunk_nix_user | default('splunk') != 'root'
                - splunk_user_id.rc != 0

            - name: Ensure splunk user has sudo access
              ansible.builtin.lineinfile:
                path: /etc/sudoers.d/splunk
                create: true
                mode: '0440'
                line: 'splunk ALL=(ALL) NOPASSWD: ALL'
                validate: 'visudo -cf %s'
              when: splunk_nix_user | default('splunk') != 'root'
          when: inventory_hostname != 'ansible-controller' and inventory_hostname != 'git-server'

    - name: Permit user logins on systemd hosts (clear pam_nologin gate)
      block:
        - name: Remove /run/nologin if present
          ansible.builtin.file:
            path: /run/nologin
            state: absent

        - name: Start systemd-user-sessions (opens user logins)
          ansible.builtin.systemd:
            name: systemd-user-sessions
            state: started
            daemon_reload: true
          when: ansible_distribution != 'AlmaLinux'

        - name: Enable systemd-user-sessions at boot (ignore if static)
          ansible.builtin.systemd:
            name: systemd-user-sessions
            enabled: true
      when: ansible_service_mgr == "systemd"

    - name: Configure Ansible Controller
      block:
        - name: Start SSH service on controller
          ansible.builtin.systemd:
            name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
            state: started
            enabled: true
          tags: [controller, ssh]

        - name: Ensure ansible SSH directory on controller
          ansible.builtin.file:
            path: /home/ansible/.ssh
            state: directory
            mode: '0700'
            owner: ansible
            group: ansible
          tags: [controller, ssh_keys]

        - name: Create ttyd service file
          ansible.builtin.copy:
            dest: /etc/systemd/system/ttyd.service
            content: |
              [Unit]
              Description=ttyd Web Terminal Service
              After=network.target

              [Service]
              Type=simple
              User=ansible
              Group=ansible
              WorkingDirectory=/home/ansible
              ExecStart=/usr/local/bin/ttyd -p 7681 -i 127.0.0.1 --writable -t fontSize=14 -t theme={"background":"#000000"} -c ansible:{{ ansible_plain_password }} /bin/bash
              Restart=always
              RestartSec=3
              StandardOutput=syslog
              StandardError=syslog
              SyslogIdentifier=ttyd

              [Install]
              WantedBy=multi-user.target
          tags: [controller, ttyd]

        - name: Enable ttyd service
          ansible.builtin.systemd:
            name: ttyd
            enabled: true
            daemon_reload: true
          tags: [controller, ttyd]

        - name: Copy SSH keys to controller /home/ansible/.ssh
          ansible.builtin.copy:
            content: "{{ item.content }}"
            dest: "{{ item.dest }}"
            mode: "{{ item.mode }}"
            owner: ansible
            group: ansible
          loop:
            - { content: "{{ runner_private_key }}", dest: /home/ansible/.ssh/id_rsa, mode: '0600' }
            - { content: "{{ runner_public_key }}", dest: /home/ansible/.ssh/id_rsa.pub, mode: '0644' }
          tags: [controller, ssh_keys]

        - name: Install controller authorized_keys
          ansible.builtin.copy:
            content: "{{ runner_public_key }}"
            dest: /home/ansible/.ssh/authorized_keys
            mode: '0600'
            owner: ansible
            group: ansible
          tags: [controller, ssh_keys]

        - name: Create ansible controller SSH config
          ansible.builtin.copy:
            content: |
              Host *
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
                LogLevel ERROR
            dest: /home/ansible/.ssh/config
            mode: '0600'
            owner: ansible
            group: ansible
          tags: [controller, ssh_keys]

        - name: Ensure nginx sites directories exist
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0755'
          loop:
            - /etc/nginx/sites-available
            - /etc/nginx/sites-enabled
          tags: [controller, nginx]

        - name: Disable default nginx site if present
          ansible.builtin.file:
            path: /etc/nginx/sites-enabled/default
            state: absent
          tags: [controller, nginx]

        - name: Ensure ttyd is running
          ansible.builtin.systemd:
            name: ttyd
            state: started
            enabled: true
          tags: [controller, ttyd]

        - name: Ensure nginx is running
          ansible.builtin.systemd:
            name: nginx
            state: started
            enabled: true
          tags: [controller, nginx]

      when: inventory_hostname == 'ansible-controller'
      tags: [controller]

- name: Bootstrap Git Server
  hosts: git_server
  gather_facts: false
  connection: docker
  vars:
    ansible_connection: docker
  tasks:
    - name: Check Gitea container is running
      ansible.builtin.raw: echo 'Git server container running - Gitea will auto-start'

    - name: Create test repositories (placeholder)
      ansible.builtin.raw: "echo 'Gitea ready for app repository testing'"
